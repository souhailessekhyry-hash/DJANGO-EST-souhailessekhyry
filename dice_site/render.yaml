services:
  - type: web
    name: dice-site
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn dice_site.wsgi:application --workers 4 --bind 0.0.0.0:$PORT --access-logfile -
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com,dice-site.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: dice-site-db
          property: connectionString

databases:
  - name: dice-site-db
    plan: free
    databaseName: dice_site
    user: dice_site_user
